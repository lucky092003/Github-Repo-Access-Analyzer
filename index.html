<!DOCTYPE html>
<html>
<head>
  <title>GitHub Access Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #58575d, #d3d3d3);
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    input {
      padding: 10px;
      width: 260px;
      border-radius: 25px;
      border: none;
      margin-bottom: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 12px;
    }

    .card h3 {
      font-size: 13px;
      opacity: 0.8;
    }

    .card p {
      font-size: 18px;
      font-weight: bold;
    }

    /*  Charts */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .chart-box {
      background: white;
      border-radius: 12px;
      padding: 10px 15px;
      color: black;
      height: 300px;
    }

    .chart-box h3 {
      font-size: 14px;
      margin-bottom: 10px;
    }

    canvas {
      max-height: 220px !important;
    }

    /* Table */
    .table-container {
      background: white;
      color: black;
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #4f46e5;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
    }

    tr:nth-child(even) {
      background: #f3f4f6;
    }

    tr:hover {
      background: #e0e7ff;
    }

    .repo-tag {
      background: #6366f1;
      color: white;
      padding: 4px 8px;
      border-radius: 10px;
      margin: 2px;
      display: inline-block;
      font-size: 12px;
    }

    .loader {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>

<header>GitHub Access Dashboard</header>

<div class="container">

  <input type="text" id="search" placeholder="🔍 Search user..." />

  <div class="cards" id="summary"></div>

  <div class="charts">
    <div class="chart-box">
      <h3>📊 Top Repositories</h3>
      <canvas id="repoChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Top Users</h3>
      <canvas id="userChart"></canvas>
    </div>
  </div>

  <div id="table-container" class="loader">
    Loading...
  </div>

</div>

<script>
let globalData = {};

fetch("http://localhost:3000/api/report")
  .then(res => res.json())
  .then(data => {
    globalData = data.accessReport;

    let repoMap = {};
    let userMap = {};

    for (let user in globalData) {
      userMap[user] = globalData[user].length;

      globalData[user].forEach(r => {
        repoMap[r.repository] = (repoMap[r.repository] || 0) + r.contributions;
      });
    }

    let mostRepo = Object.keys(repoMap).reduce((a,b)=> repoMap[a]>repoMap[b]?a:b);
    let topUser = Object.keys(userMap).reduce((a,b)=> userMap[a]>userMap[b]?a:b);

    document.getElementById("summary").innerHTML = `
      <div class="card"><h3>Organization</h3><p>${data.organization}</p></div>
      <div class="card"><h3>Total Repos</h3><p>${data.totalRepositories}</p></div>
      <div class="card"><h3>Total Users</h3><p>${data.totalUsers}</p></div>
      <div class="card"><h3> Top Repo</h3><p>${mostRepo}</p></div>
      <div class="card"><h3> Top User</h3><p>${topUser}</p></div>
    `;

    renderCharts(repoMap, userMap);
    renderTable(globalData);
  });

//  Charts
function renderCharts(repoMap, userMap) {

  const topRepos = Object.entries(repoMap)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  const topUsers = Object.entries(userMap)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  new Chart(document.getElementById("repoChart"), {
    type: 'bar',
    data: {
      labels: topRepos.map(r=>r[0]),
      datasets: [{
        label: 'Access',
        data: topRepos.map(r=>r[1]),
        borderRadius: 6,
        barThickness: 30
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { stepSize: 1 }
        }
      }
    }
  });

  new Chart(document.getElementById("userChart"), {
    type: 'doughnut',
    data: {
      labels: topUsers.map(u=>u[0]),
      datasets: [{
        data: topUsers.map(u=>u[1])
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            boxWidth: 12,
            font: { size: 11 }
          }
        }
      }
    }
  });
}

// Table
function renderTable(data) {
  let html = `<div class="table-container"><table>
    <thead><tr><th>User</th><th>Repositories</th></tr></thead><tbody>`;

  for (let user in data) {
    html += `<tr><td><b>${user}</b></td><td>`;
    data[user].forEach(r => {
      html += `<span class="repo-tag">${r.repository}</span>`;
    });
    html += `</td></tr>`;
  }

  html += `</tbody></table></div>`;
  document.getElementById("table-container").innerHTML = html;
}

// Search
document.getElementById("search").addEventListener("input", function() {
  const val = this.value.toLowerCase();
  const filtered = {};

  for (let u in globalData) {
    if (u.toLowerCase().includes(val)) {
      filtered[u] = globalData[u];
    }
  }

  renderTable(filtered);
});
</script>

</body>
</html>
